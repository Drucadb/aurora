<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA • Manutenção</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #03050a;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Fundo animado */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            filter: blur(40px);
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            33% { transform: scale(1.2) rotate(2deg); opacity: 0.8; }
            66% { transform: scale(0.9) rotate(-2deg); opacity: 0.6; }
        }

        /* Estrelas */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1); }
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Card de manutenção */
        .maintenance-card {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 60px 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.02) inset,
                0 0 100px rgba(99, 102, 241, 0.2);
            text-align: center;
        }

        /* Ícone de ferramentas animado */
        .tools-icon {
            font-size: 80px;
            margin-bottom: 30px;
            display: inline-block;
            animation: spin 10s linear infinite;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5));
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Título */
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Subtítulo */
        .subtitle {
            font-size: 18px;
            color: #9ca3af;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Timer principal */
        .timer-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timer-label {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: monospace;
            letter-spacing: 5px;
            animation: timerPulse 1s infinite;
        }

        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .timer-sub {
            font-size: 14px;
            color: #6b7280;
            margin-top: 10px;
        }

        /* Barra de progresso */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 70%;
            background: linear-gradient(90deg, #6366f1, #ec4899);
            border-radius: 3px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; opacity: 0; }
            50% { width: 100%; opacity: 1; }
            100% { width: 0%; opacity: 0; }
        }

        /* Status */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #f59e0b;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 20px #f59e0b;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .status-text {
            color: #f59e0b;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Botão TikTok - DESTAQUE */
        .tiktok-section {
            margin: 40px 0;
            position: relative;
        }

        .tiktok-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 60px;
            padding: 20px 50px;
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: 700;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: tiktokPulse 2s infinite;
            width: 100%;
            max-width: 400px;
        }

        @keyframes tiktokPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 20px 40px rgba(236, 72, 153, 0.6); }
        }

        .tiktok-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .tiktok-button:hover::before {
            left: 100%;
        }

        .tiktok-button:hover {
            transform: scale(1.1);
            border-color: #ec4899;
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.8);
        }

        .tiktok-icon {
            font-size: 40px;
            filter: drop-shadow(0 0 10px rgba(236, 72, 153, 0.5));
        }

        .tiktok-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
        }

        .tiktok-handle {
            font-size: 18px;
            color: #9ca3af;
        }

        /* Mensagem de contato */
        .contact-message {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 40px;
            padding: 15px;
            margin: 20px 0;
            font-size: 16px;
            color: #fff;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { border-color: rgba(99, 102, 241, 0.3); }
            50% { border-color: rgba(236, 72, 153, 0.8); }
        }

        .contact-message strong {
            color: #ec4899;
        }

        /* Loading dots */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: loadingDots 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingDots {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* Efeito de brilho */
        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(40px);
            animation: glowPulse 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 36px;
            }
            
            .tools-icon {
                font-size: 60px;
            }

            .timer-display {
                font-size: 36px;
                letter-spacing: 3px;
            }

            .tiktok-button {
                padding: 15px 30px;
                font-size: 20px;
            }

            .tiktok-icon {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="gradient"></div>
        <div class="stars" id="stars"></div>
    </div>

    <div class="glow"></div>

    <div class="container">
        <div class="maintenance-card">
            <!-- Ícone animado -->
            <div class="tools-icon">
                🔧
            </div>

            <!-- Título -->
            <h1>EM MANUTENÇÃO</h1>

            <!-- Subtítulo -->
            <div class="subtitle" id="statusMessage">
                Estamos atualizando o sistema para você!
            </div>

            <!-- Timer principal com hora definida -->
            <div class="timer-container">
                <div class="timer-label">🕒 PREVISÃO DE RETORNO</div>
                <div class="timer-display" id="countdownTimer">11:00:00</div>
                <div class="timer-sub">Horário de Brasília</div>
            </div>

            <!-- Barra de progresso animada -->
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>

            <!-- Status -->
            <div class="status">
                <div class="status-dot"></div>
                <span class="status-text">ATUALIZAÇÃO EM ANDAMENTO</span>
            </div>

            <!-- Loading dots -->
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <!-- Mensagem de contato -->
            <div class="contact-message">
                <strong>📱 QUER SABER MAIS?</strong><br>
                Me chame no TikTok para mais informações
            </div>

            <!-- Botão TikTok -->
            <div class="tiktok-section">
                <a href="https://www.tiktok.com/@sylles025" target="_blank" class="tiktok-button">
                    <span class="tiktok-icon">📱</span>
                    <span class="tiktok-text">
                        <strong>@sylles025</strong>
                        <span class="tiktok-handle">TikTok Oficial</span>
                    </span>
                    <span style="font-size: 20px;">→</span>
                </a>
            </div>

            <!-- Mensagem adicional -->
            <div class="subtitle" style="font-size: 14px; margin-top: 20px;">
                Envie mensagem no privado para saber mais<br>
                sobre a recuperação de contas!
            </div>
        </div>
    </div>

    <script>
        // Criar estrelas
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Timer regressivo para 17:50
        function updateCountdown() {
            const now = new Date();
            const target = new Date();
            
            // Define o horário alvo para 17:50 de hoje
            target.setHours(17, 50, 0, 0);
            
            // Se já passou das 17:50, coloca para amanhã
            if (now > target) {
                target.setDate(target.getDate() + 1);
            }
            
            // Calcula a diferença
            const diff = target - now;
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            // Formata o timer
            const timerString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('countdownTimer').textContent = timerString;
            
            // Mensagens baseadas no tempo
            if (hours === 0 && minutes < 30) {
                document.getElementById('statusMessage').innerHTML = "🔥 Quase pronto! Aguarde só mais um pouquinho...";
            } else if (hours === 0 && minutes < 60) {
                document.getElementById('statusMessage').innerHTML = "⚡ Finalizando os últimos ajustes!";
            }
        }

        setInterval(updateCountdown, 1000);

        // Mensagens alternadas
        const messages = [
            "Estamos atualizando o sistema para você!",
            "Quase lá... mais alguns ajustes!",
            "Preparando novidades incríveis!",
            "Otimizando a performance do site!",
            "Em breve tudo estará funcionando!",
            "Agradecemos sua paciência! ❤️"
        ];

        let messageIndex = 0;
        setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            document.getElementById('statusMessage').innerHTML = messages[messageIndex];
        }, 5000);
    </script>
</body>
</html>
