<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Aurora • Em Manutenção</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* BACKGROUND ANIMADO */
        .bg-aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
            animation: auroraMove 15s ease infinite;
            z-index: 0;
        }

        @keyframes auroraMove {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* GRID DE FUNDO */
        .grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        /* CARD PRINCIPAL */
        .card {
            position: relative;
            z-index: 10;
            max-width: 550px;
            width: 100%;
            background: rgba(15, 20, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ÍCONE DE MANUTENÇÃO */
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .icon-wrapper span {
            font-size: 52px;
        }

        /* TÍTULOS */
        .badge {
            display: inline-block;
            background: rgba(236, 72, 153, 0.15);
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 60px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            color: #ec4899;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .description {
            color: #9ca3af;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .description strong {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        /* RELÓGIO */
        .clock-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .time {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 52px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-align: center;
        }

        .date {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-top: 12px;
            font-weight: 500;
        }

        /* STATUS */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #f43f5e;
            border-radius: 50%;
            box-shadow: 0 0 10px #f43f5e;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        .status span {
            color: #9ca3af;
            font-size: 14px;
            font-weight: 500;
        }

        /* BOTÃO TIKTOK */
        .tiktok-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 18px 32px;
            width: 100%;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .tiktok-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .tiktok-btn:hover::before {
            left: 100%;
        }

        .tiktok-btn:hover {
            transform: translateY(-3px);
            border-color: #ec4899;
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.2);
        }

        .tiktok-icon {
            width: 28px;
            height: 28px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 15.58a6.34 6.34 0 0 0 10.86 4.5 6.34 6.34 0 0 0 1.86-4.5V9.41a7.5 7.5 0 0 0 4.4 1.42V7.39a4.83 4.83 0 0 1-2.53-.7z"/></svg>') no-repeat center;
            background-size: contain;
        }

        .tiktok-btn span:not(.tiktok-icon) {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .tiktok-username {
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CONTADOR REGRESSIVO */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 12px 20px;
            min-width: 70px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .countdown-number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: monospace;
        }

        .countdown-label {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* FOOTER */
        .footer {
            margin-top: 35px;
            text-align: center;
            color: #4b5563;
            font-size: 12px;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .footer span {
            color: #6366f1;
        }

        /* RESPONSIVO */
        @media (max-width: 500px) {
            .card {
                padding: 35px 25px;
                border-radius: 36px;
            }
            
            h1 {
                font-size: 40px;
            }
            
            .time {
                font-size: 36px;
                letter-spacing: 2px;
            }
            
            .countdown-item {
                min-width: 60px;
                padding: 8px 12px;
            }
            
            .countdown-number {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-aurora"></div>
    <div class="grid"></div>

    <div class="card">
        <!-- Ícone -->
        <div class="icon-wrapper">
            <span>🔧✨</span>
        </div>

        <!-- Badge -->
        <div style="text-align: center;">
            <div class="badge">MANUTENÇÃO PROGRAMADA</div>
        </div>

        <!-- Título -->
        <h1 style="text-align: center;">Aurora<br>em manutenção</h1>
        
        <!-- Descrição -->
        <p class="description" style="text-align: center;">
            Estamos atualizando a plataforma para trazer<br>
uma experiência ainda melhor pra você. Acompanhe no <strong>@sylles025</strong>
        </p>

        <!-- Relógio -->
        <div class="clock-container">
            <div class="time" id="clock">--:--:--</div>
            <div class="date" id="date">Carregando...</div>
        </div>

        <!-- Status -->
        <div class="status">
            <div class="pulse-dot"></div>
            <span>Tempo estimado: 4 horas</span>
        </div>

        <!-- Contador Regressivo -->
        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Horas</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">00</div>
                <div class="countdown-label">Minutos</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">00</div>
                <div class="countdown-label">Segundos</div>
            </div>
        </div>

        <!-- Botão TikTok com Ícone -->
        <a href="https://www.tiktok.com/@sylles025" class="tiktok-btn" id="tiktokLink" target="_blank">
            <div class="tiktok-icon"></div>
            <span>Acompanhar no <span class="tiktok-username" id="tiktokUsername">@sylles025</span></span>
            <span style="font-size: 18px;">→</span>
        </a>

        <!-- Footer -->
        <div class="footer">
            <div>✦ Aurora Platform</div>
            <div>🔧 <span>v2.0</span> em breve</div>
        </div>
    </div>

    <script>
        // ===== CONFIGURAÇÕES DO TIKTOK =====
        // ALTERE AQUI O SEU @ DO TIKTOK
        const TIKTOK_USERNAME = "@sylles025";  // ← COLOQUE SEU @ AQUI!
        const TIKTOK_URL = "https://www.tiktok.com/@sylles025";  // ← COLOQUE O LINK AQUI!
        
        // Atualizar o nome do TikTok em todos os lugares
        document.getElementById('tiktokUsername').textContent = TIKTOK_USERNAME;
        document.getElementById('tiktokLink').href = TIKTOK_URL;
        
        // Atualizar o parágrafo com o @
        const descriptionStrong = document.querySelector('.description strong');
        if (descriptionStrong) {
            descriptionStrong.textContent = TIKTOK_USERNAME;
        }
        
        // ===== RELÓGIO EM TEMPO REAL =====
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const dateStr = now.toLocaleDateString('pt-BR', options);
            document.getElementById('date').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }
        
        updateClock();
        setInterval(updateClock, 1000);
        
        // ===== CONTADOR REGRESSIVO (4 HORAS A PARTIR DE AGORA) =====
        const endTime = new Date();
        endTime.setHours(endTime.getHours() + 4);
        
        function updateCountdown() {
            const now = new Date();
            const diff = endTime - now;
            
            if (diff <= 0) {
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
